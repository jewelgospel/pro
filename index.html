<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | UI/UX & Illustration</title>
    <style>
        :root {
            --bg-color: #fdfcf8;
            --primary-color: #b5a48b;
            --text-color: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #f5f1e6, var(--bg-color));
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--primary-color);
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .portfolio-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(181, 164, 139, 0.2);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(181, 164, 139, 0.2);
        }

        .portfolio-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .portfolio-info {
            padding: 15px;
            text-align: center;
        }

        .portfolio-info h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--primary-color);
            font-weight: 400;
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid white;
        }

        footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>MY WORKS</h1>
    <p>Selected Projects & Illustrations</p>
</header>

<div class="container">
    <div class="portfolio-grid">
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="UI1.png"> <div class="portfolio-info"><h3>UI Design Concept</h3></div></div>
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="0423.jpg"> <div class="portfolio-info"><h3>Design Sketch 0423</h3></div></div>
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="0423A.jpg"> <div class="portfolio-info"><h3>Process Details</h3></div></div>
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="icon.jpg"> <div class="portfolio-info"><h3>Custom Icons</h3></div></div>
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="jewel.jpg"> <div class="portfolio-info"><h3>Jewel Illustration</h3></div></div>
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="mothersday.jpg"> <div class="portfolio-info"><h3>Mother's Day Theme</h3></div></div>
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="flower.jpg"> <div class="portfolio-info"><h3>Floral Sketch</h3></div></div>
        <div class="portfolio-item" onclick="openLightbox(this)"><img src="book.jpg"> <div class="portfolio-info"><h3>Object Drawing</h3></div></div>
    </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<footer>&copy; 2026 Designed for Portfolio</footer>

<script>
    function openLightbox(el) {
        document.getElementById('lightbox-img').src = el.querySelector('img').src;
        document.getElementById('lightbox').style.display = 'flex';
    }
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }
</script>

</body>
</html>
