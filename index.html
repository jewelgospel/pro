<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | UI/UX Designer</title>
    <style>
        :root {
            --bg-color: #fdfcf8; /* 象牙白 */
            --primary-color: #b5a48b; /* 霧金/黃銅色 */
            --text-color: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to bottom, #f5f1e6, var(--bg-color));
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 作品集網格 */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .portfolio-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            border: 1px solid rgba(181, 164, 139, 0.2);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-10px);
        }

        .portfolio-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 1px solid rgba(181, 164, 139, 0.1);
        }

        .portfolio-info {
            padding: 20px;
        }

        .portfolio-info h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .portfolio-info p {
            font-size: 0.9rem;
            margin: 0;
            opacity: 0.8;
        }

        /* 響應式調整 */
        @media (max-width: 600px) {
            header { padding: 40px 20px; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>DESIGN PORTFOLIO</h1>
        <p>UI/UX & Original Illustration</p>
    </header>

    <div class="container">
        <div class="portfolio-grid">
            
            <div class="portfolio-item">
                <img src="UI1.png" alt="UI Design">
                <div class="portfolio-info">
                    <h3>UI Interface Concept</h3>
                    <p>利用輕盈的視覺語言重構的介面設計，強調操作的直覺與通透感。</p>
                </div>
            </div>

            <div class="portfolio-item">
                <img src="jewel.jpg" alt="Hand-drawn Jewel">
                <div class="portfolio-info">
                    <h3>Original Assets: Jewel</h3>
                    <p>個人原創手繪遊戲素材，運用細膩的筆觸展現復古寶石質感。</p>
                </div>
            </div>

            <div class="portfolio-item">
                <img src="0423.jpg" alt="Project Update">
                <div class="portfolio-info">
                    <h3>Development Log</h3>
                    <p>記錄設計過程中的細節與反饋，這是我持續優化專案的過程。</p>
                </div>
            </div>

            <div class="portfolio-item">
                <img src="icon.jpg" alt="Icon Design">
                <div class="portfolio-info">
                    <h3>Custom Icon Set</h3>
                    <p>針對特定主題開發的圖示集，確保視覺風格與系統一致。</p>
                </div>
            </div>

        </div>
    </div>

    <footer style="text-align: center; padding: 60px; opacity: 0.5; font-size: 0.8rem;">
        &copy; 2026 UI/UX Portfolio. All Rights Reserved.
    </footer>

</body>
</html>
